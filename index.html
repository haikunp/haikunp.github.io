<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Viewer</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #f4f4f4;
    --text: #222;
    --tab-bg: #fff;
    --tab-border: #ccc;
    --tab-active-bg: #2563eb;
    --tab-active-text: #fff;
    --frame-bg: #000;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --text: #eaeaea;
      --tab-bg: #1e1e1e;
      --tab-border: #333;
      --tab-active-bg: #3b82f6;
      --tab-active-text: #fff;
      --frame-bg: #000;
      --shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.4rem;
    margin-bottom: 16px;
    text-align: center;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .tab {
    flex: 1;
    min-width: 110px;
    padding: 10px 16px;
    background: var(--tab-bg);
    color: var(--text);
    border: 1px solid var(--tab-border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
  }

  .tab:hover {
    transform: translateY(-1px);
  }

  .tab.active {
    background: var(--tab-active-bg);
    color: var(--tab-active-text);
    border-color: var(--tab-active-bg);
  }

  .frame-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 aspect ratio */
    background: var(--frame-bg);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #888;
    font-size: 0.9rem;
  }

  @media (max-width: 480px) {
    .tab {
      font-size: 0.85rem;
      padding: 9px 10px;
    }
    h1 { font-size: 1.15rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>📺 Stream Viewer</h1>

    <div class="tabs" role="tablist">
      <button class="tab active" data-src="https://gooz.aapmains.net/new-stream-embed/51875" role="tab">Server 1</button>
      <button class="tab" data-src="https://gooz.aapmains.net/new-stream-embed/51184" role="tab">Server 2</button>
      <button class="tab" data-src="https://gooz.aapmains.net/new-stream-embed/51865" role="tab">Server 3</button>
    </div>

    <div class="frame-wrapper">
      <div class="loading" id="loading">Loading stream…</div>
      <iframe id="player" src="https://gooz.aapmains.net/new-stream-embed/51875" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
  </div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const player = document.getElementById('player');
  const loading = document.getElementById('loading');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      loading.style.display = 'block';
      player.src = tab.dataset.src;
    });
  });

  player.addEventListener('load', () => {
    loading.style.display = 'none';
  });
</script>
</body>
</html>
