<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub - FIFA World Cup 2026 Live Streams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --border: #e2e8f0;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }

  [data-theme="dark"] {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent: #60a5fa;
    --accent-glow: rgba(96, 165, 250, 0.3);
    --border: #334155;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s ease, color 0.3s ease;
  }

  header {
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
  }
  .logo { font-weight: 800; font-size: 1.25rem; color: var(--accent); letter-spacing: -0.5px; }
  
  .theme-toggle {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    transition: all 0.3s ease;
  }
  .theme-toggle:hover { transform: rotate(20deg); border-color: var(--accent); }

  main {
    flex: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    width: 100%;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 0.5rem;
    color: var(--text-primary);
  }

  .subtitle {
    text-align: center;
    color: var(--text-secondary);
    margin-bottom: 2rem;
    font-size: 1rem;
  }

  /* Match Cards */
  .game-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 1.5rem;
    padding: 2rem;
    text-decoration: none;
    color: var(--text-primary);
    box-shadow: var(--shadow);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.3s ease;
  }

  .game-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 10px 25px -5px var(--accent-glow);
  }

  .team {
    text-align: center;
    flex: 1;
  }

  .team img {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid var(--border);
    margin-bottom: 0.75rem;
    box-shadow: var(--shadow);
    background: #fff;
  }

  .team h2 {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .vs {
    text-align: center;
    padding: 0 1.5rem;
  }

  .vs .badge {
    background: var(--accent);
    color: white;
    padding: 0.35rem 0.85rem;
    border-radius: 2rem;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 10px var(--accent-glow);
    display: inline-block;
    margin-bottom: 0.5rem;
  }

  .vs h3 {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--text-secondary);
    margin: 0.25rem 0;
  }

  .vs .time {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Ad Sections */
  .affiliate-ads {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin: 2rem auto;
    max-width: 700px;
  }

  .affiliate-ads a {
    display: inline-block;
  }

  .affiliate-ads img {
    border-radius: 0.5rem;
    transition: transform 0.3s ease;
  }

  .affiliate-ads img:hover {
    transform: scale(1.05);
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: var(--text-secondary);
    font-size: 0.875rem;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
  }

  @media (max-width: 768px) {
    header { padding: 1rem; }
    main { padding: 1.5rem 1rem; }
    h1 { font-size: 1.5rem; }
    .game-card {
      flex-direction: column;
      gap: 1rem;
      padding: 1.5rem;
    }
    .team img { width: 70px; height: 70px; }
    .team h2 { font-size: 1rem; }
    .vs { padding: 0.5rem 0; }
    .vs h3 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

  <header>
    <div class="logo">⚽ StreamHub</div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">🌙</button>
  </header>

  <main>
    <h1>FIFA World Cup 2026 - Live Streams</h1>
    <p class="subtitle">Click on a match to watch live streaming</p>

    <!-- Match 1: Canada vs Bosnia & Herzegovina -->
    <a href="game1.html" class="game-card">
      <div class="team">
        <img src="https://flagcdn.com/w320/ca.png" alt="Canada Flag">
        <h2>Canada</h2>
      </div>
      <div class="vs">
        <span class="badge">Group B</span>
        <h3>VS</h3>
        <span class="time">June 12, 2026 • 19:00 UTC</span>
      </div>
      <div class="team">
        <img src="https://flagcdn.com/w320/ba.png" alt="Bosnia and Herzegovina Flag">
        <h2>Bosnia & Herzegovina</h2>
      </div>
    </a>

    <!-- Match 2: USA vs Paraguay -->
    <a href="game2.html" class="game-card">
      <div class="team">
        <img src="https://flagcdn.com/w320/us.png" alt="USA Flag">
        <h2>USA</h2>
      </div>
      <div class="vs">
        <span class="badge">Group A</span>
        <h3>VS</h3>
        <span class="time">June 13, 2026 • 01:00 UTC</span>
      </div>
      <div class="team">
        <img src="https://flagcdn.com/w320/py.png" alt="Paraguay Flag">
        <h2>Paraguay</h2>
      </div>
    </a>

    <!-- A-Ads -->
    <div id="frame" style="width: 100%;margin: 2rem auto;position: relative; z-index: 99998; text-align: center;">
      <iframe data-aa='2443372' src='//acceptable.a-ads.com/2443372/?size=Adaptive' style='border:0; padding:0; width:70%; max-width: 900px; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
    </div>

    <!-- Affiliate Banner Ads -->
    <div class="affiliate-ads">
      <a href="https://viefaucet.com?r=61e83d585cc8356fa4bda9a9" target="_blank">
        <img src="https://viefaucet.com/banners/300x250.gif" alt="VieFaucet" border="0" />
      </a>
      <a href="https://earnbitmoon.club/?ref=145452" target="_blank">
        <img src="https://earnbitmoon.club/promo/EBM-300x250.gif" alt="Earnbitmoon - ultimate faucet !" border="0" />
      </a>
    </div>
  </main>

  <footer>
    <p>© 2026 StreamHub. All rights reserved. | Live Sports Streaming</p>
  </footer>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      themeToggle.textContent = newTheme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
